models:
  - name: dim_customers
    semantic_model:
      enabled: true
      name: dim_customers
    description: |
      semantic model for dim_customers
    agg_time_dimension: most_recent_order_date
    columns:
      - name: customer_id
        entity:
          type: primary
          name: customer
      - name: first_name
        dimension:
          type: categorical
          name: customer_name
      - name: first_order_date
        dimension:
          type: time
        granularity: day
      - name: most_recent_order_date
        dimension:
          type: time
        granularity: day
    metrics:
      - name: "customers_with_orders"
        label: "customers_with_orders"
        description: "Unique count of customers placing orders"
        type: simple
        agg: count_distinct
        expr: customer_id
      - name: count_lifetime_orders
        description: Total count of orders per customer.
        agg: sum
        expr: number_of_orders
        type: simple
        hidden: true
      - name: lifetime_spend
        agg: sum
        expr: lifetime_value
        description: Gross customer lifetime spend inclusive of taxes.
        type: simple
        hidden: true