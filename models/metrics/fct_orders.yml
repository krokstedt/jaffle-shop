models:
  - name: fct_orders
    semantic_model:
      enabled: true
      name: fct_orders
    description: |
      Order fact table. This table’s grain is one row per order
    agg_time_dimension: order_date
    columns:
      - name: order_id
        entity:
          type: primary
      - name: customer_id
        entity:
          type: foreign
          name: customer
      - name: order_date
        dimension:
          type: time
        granularity: day
    metrics:
      - name: "order_total"
        description: "Sum of orders value"
        type: simple
        label: "order_total"
        agg: sum
        expr: amount
      - name: "order_count"
        description: "number of orders"
        type: simple
        label: "order_count"
        agg: sum
        expr: 1
      - name: large_orders
        description: "Count of orders with order total over 20."
        type: simple
        label: "Large Orders"
        filter: |
          {{ Metric('order_total', group_by=['order_id']) }} >=  20
  # Ratio type metric
        agg: sum
        expr: 1
      - name: order_value_p99
        expr: amount
        agg: percentile
        type: simple
        hidden: true
        percentile: 0.99
        percentile_type: discrete
      - name: "avg_order_value"
        label: "avg_order_value"
        description: "average value of each order"
        type: ratio
        numerator:
          name: order_total
        denominator:
          name: order_count
  # Cumulative type metrics
      - name: order_total_1
        description: The total amount for each order including taxes.
        agg: sum
        expr: amount
        type: simple
        hidden: true
      - name: "cumulative_order_amount_mtd"
        label: "cumulative_order_amount_mtd"
        description: "The month to date value of all orders"
        type: cumulative
        grain_to_date: month
        input_metric:
          name: order_total_1
      - name: "pct_of_orders_that_are_large"
        label: "pct_of_orders_that_are_large"
        description: "percent of orders that are large"
        type: derived
        expr: large_orders/order_count
        input_metrics:
          - name: large_orders
          - name: order_count